function SearchWithAutocomplete({search, setSearch, onSearchClick}) {
  const [suggestions, setSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);
  
  const generateSuggestions = useCallback((query) => {
    if (!query || query.length < 2) return [];
    
    const q = query.toLowerCase();
    const matches = [];
    
    CONTROLS.forEach(c => {
      if (c.id.toLowerCase().includes(q)) matches.push({ type: "Control ID", text: c.id, desc: c.name });
      else if (c.name.toLowerCase().includes(q)) matches.push({ type: "Control", text: c.name.slice(0, 40) + (c.name.length > 40 ? "..." : ""), desc: c.id });
      else if (c.soc2.toLowerCase().includes(q)) matches.push({ type: "SOC 2", text: c.soc2.split(",")[0].trim(), desc: c.id + " - " + c.name.slice(0, 30) });
      else if (c.cis.toLowerCase().includes(q)) matches.push({ type: "CIS", text: c.cis.split(",")[0].trim(), desc: c.id + " - " + c.name.slice(0, 30) });
      else if (c.nistCat.toLowerCase().includes(q)) matches.push({ type: "NIST", text: c.nistCat, desc: c.id + " - " + c.name.slice(0, 30) });
    });
    
    // Add keyword suggestions
    const keywords = ["MFA", "encryption", "access control", "incident", "backup", "authentication", "malware", "vulnerability", "logging", "monitoring"];
    keywords.forEach(kw => {
      if (kw.toLowerCase().includes(q)) matches.push({ type: "Keyword", text: kw, desc: "Search for controls related to " + kw });
    });
    
    return [...new Map(matches.map(m => [m.text, m])).values()].slice(0, 8);
  }, []);
  
  useEffect(() => {
    const newSuggestions = generateSuggestions(search);
    setSuggestions(newSuggestions);
    setShowSuggestions(newSuggestions.length > 0 && search.length >= 2);
  }, [search, generateSuggestions]);
  
  const handleSuggestionClick = (suggestion) => {
    setSearch(suggestion.text);
    setShowSuggestions(false);
  };
  
  return e("div", { style: { position: "relative", marginBottom: 14 } },
    e("input", {
      type: "text",
      value: search,
      onChange: (ev) => setSearch(ev.target.value),
      onBlur: () => setTimeout(() => setShowSuggestions(false), 150),
      onFocus: () => setSuggestions(generateSuggestions(search)),
      placeholder: "Search controls, frameworks, keywords (e.g. MFA, CC6.1, CIS 5, access)...",
      style: {
        width: "100%",
        padding: "12px 16px",
        borderRadius: 8,
        border: "1px solid #1e2d3d",
        background: "#0d1520",
        color: "#e2e8f0",
        fontSize: 14,
        outline: "none",
        boxSizing: "border-box",
        fontFamily: "inherit"
      }
    }),
    showSuggestions && e("div", {
      className: "autocomplete-dropdown",
      style: {
        position: "absolute",
        top: "100%",
        left: 0,
        right: 0,
        background: "#0d1520",
        border: "1px solid #1e2d3d",
        borderTop: "none",
        borderRadius: "0 0 8px 8px",
        zIndex: 100,
        maxHeight: 200,
        overflow: "auto"
      }
    },
      suggestions.map((suggestion, i) =>
        e("div", {
          key: i,
          onClick: () => handleSuggestionClick(suggestion),
          style: {
            padding: "8px 12px",
            cursor: "pointer",
            borderBottom: i < suggestions.length - 1 ? "1px solid #1a2a3a" : "none",
            transition: "background 0.15s"
          },
          onMouseEnter: (ev) => ev.target.style.background = "#1a2a3a",
          onMouseLeave: (ev) => ev.target.style.background = "transparent"
        },
          e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
            e("div", {},
              e("span", { style: { color: "#00d4aa", fontSize: 13, fontWeight: 600 } }, suggestion.text),
              e("div", { style: { color: "#4a5568", fontSize: 11, marginTop: 2 } }, suggestion.desc)
            ),
            e("span", { style: { fontSize: 10, color: "#4a5568", fontWeight: 600, textTransform: "uppercase" } }, suggestion.type)
          )
        )
      )
    ),
    e(ExampleSearches, { onSearchClick, search })
  );
}

}

function App(){
  var _s=useState(""),search=_s[0],setSearch=_s[1];
  var _c=useState("All"),catFilter=_c[0],setCatFilter=_c[1];
  var _f=useState("All"),funcFilter=_f[0],setFuncFilter=_f[1];
  var _e=useState(null),expanded=_e[0],setExpanded=_e[1];
  var _t=useState(false),showTutorial=_t[0],setShowTutorial=_t[1];
  
  // Show tutorial on first visit
  useEffect(() => {
    if (!localStorage.getItem('grc-tool-visited')) {
      setShowTutorial(true);
      localStorage.setItem('grc-tool-visited', 'true');
    }
  }, []);

  var filtered=useMemo(function(){
    var q=search.toLowerCase();
    return CONTROLS.filter(function(c){
      if(catFilter!=="All"&&c.cat!==catFilter)return false;
      if(funcFilter!=="All"&&c.nistFunc!==funcFilter)return false;
      if(!q)return true;
      return[c.id,c.name,c.nistCat,c.nistSub,c.soc2,c.cis,c.pci,c.ce,c.notes].some(function(v){return v.toLowerCase().includes(q)});
    });
  },[search,catFilter,funcFilter]);

  var stats=useMemo(function(){
    return{total:filtered.length,funcs:Object.keys(FC).map(function(f){return{name:f,count:filtered.filter(function(c){return c.nistFunc===f}).length}})};
  },[filtered]);

  const handleExampleSearch = (searchText) => {
    setSearch(searchText);
  };

  return e("div",{style:{minHeight:"100vh",background:"#080e18",color:"#e2e8f0",fontFamily:"'DM Sans','Segoe UI',sans-serif"}},
    showTutorial && e(TutorialModal, { onClose: () => setShowTutorial(false) }),
    e("div",{style:{maxWidth:720,margin:"0 auto",padding:"24px 16px"}},
      e("div",{style:{marginBottom:28}},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("span",{style:{fontSize:22}},"\uD83D\uDEE1"),
            e("h1",{style:{fontSize:22,fontWeight:800,color:"#fff",margin:0}},"InfoSec Controls Cross-Reference")
          ),
          e("button",{
            onClick:()=>setShowTutorial(true),
            style:{padding:"4px 12px",borderRadius:16,border:"1px solid #1e2d3d",background:"transparent",color:"#4a5568",fontSize:11,fontWeight:600,cursor:"pointer"}
          },"? Help")
        ),
        e("p",{style:{color:"#4a5568",fontSize:13,margin:"4px 0 0"}},"ISO 27001:2022 \u2192 NIST CSF 2.0 \u00B7 SOC 2 \u00B7 CIS v8 \u00B7 PCI DSS \u00B7 Cyber Essentials")
      ),
      e(SearchWithAutocomplete, { search, setSearch, onSearchClick: handleExampleSearch }),
      e("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},
        e("span",{style:{fontSize:11,color:"#4a5568",fontWeight:600,alignSelf:"center",marginRight:4}},"ISO Category:"),
        ["All","Organizational","People","Physical","Technological"].map(function(c){return e(Pill,{key:c,label:c,active:catFilter===c,onClick:function(){setCatFilter(c)},color:CC[c]})})
      ),
      e("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:18}},
        e("span",{style:{fontSize:11,color:"#4a5568",fontWeight:600,alignSelf:"center",marginRight:4}},"NIST Function:"),
        ["All","GOVERN","IDENTIFY","PROTECT","DETECT","RESPOND","RECOVER"].map(function(f){return e(Pill,{key:f,label:f,active:funcFilter===f,onClick:function(){setFuncFilter(f)},color:FC[f]})})
      ),
      e("div",{style:{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}},
        stats.funcs.filter(function(f){return f.count>0}).map(function(f){
          return e("div",{key:f.name,style:{padding:"6px 12px",borderRadius:6,background:FC[f.name]+"12",border:"1px solid "+FC[f.name]+"25",textAlign:"center"}},

          )

          e("div",{style:{fontSize:18,fontWeight:800,color:"#00d4aa"}},stats.total),

        )

      e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        filtered.length===0&&e("div",{style:{textAlign:"center",padding:40,color:"#4a5568"}},"No controls match your search."),
        filtered.map(function(c){return e(ControlCard,{key:c.id,c:c,expanded:expanded===c.id,onToggle:function(){setExpanded(expanded===c.id?null:c.id)}})})

      e("div",{style:{marginTop:32,paddingTop:16,borderTop:"1px solid #1e2d3d",textAlign:"center",color:"#2d3748",fontSize:11}},
        "ISO 27001:2022 \u00B7 NIST CSF 2.0 \u00B7 SOC 2 2022 \u00B7 CIS v8 \u00B7 PCI DSS 4.0 \u00B7 Cyber Essentials \u00B7 Built by @in_herspace"

}
